<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu PDF Slider</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .swiper { width: 100%; height: 90vh; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .swiper-button-next, .swiper-button-prev { color: #fff; }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper" id="pdf-wrapper">
        </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // 1. NOME DO SEU ARQUIVO PDF AQUI:
    const url = 'FLYER INTERATIVO (1080 x 1920 px) CLICK.pdf'; 

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const wrapper = document.getElementById('pdf-wrapper');

    // Carregar o PDF
    pdfjsLib.getDocument(url).promise.then(pdf => {
        for (let i = 1; i <= pdf.numPages; i++) {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            const canvas = document.createElement('canvas');
            slide.appendChild(canvas);
            wrapper.appendChild(slide);

            pdf.getPage(i).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                page.render({ canvasContext: context, viewport: viewport });
            });
        }

        // Iniciar o Swiper depois de carregar as páginas
        setTimeout(() => {
            new Swiper('.swiper', {
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                pagination: { el: '.swiper-pagination', clickable: true },
                slidesPerView: 1, // SÓ UMA PÁGINA POR VEZ (Seu pedido!)
                centeredSlides: true,
            });
        }, 500);
    });
</script>
</body>
</html>
